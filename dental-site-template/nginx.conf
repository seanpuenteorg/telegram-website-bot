server {
    listen $PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Embedded booking portal SPA — any path under /book/ that isn't a real file
    # (e.g. /book/cube-dental, /book/some-slug) falls back to /book/index.html so the
    # client-side router can handle it. Real assets (/book/app.js, /book/index.html) still
    # serve normally because try_files tries $uri first.
    location /book/ {
        try_files $uri $uri/ /book/index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|svg|woff2|woff|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    error_page 404 /404.html;
}
